kind = "web"
previewPath = "/"
title = "StreamBox — মুভি ও অ্যানিমে"
version = "1.0.0"
id = "artifacts/streambox"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23561

[services.development]
run = "pnpm --filter @workspace/streambox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streambox", "run", "build" ]
serve = "static"
publicDir = "artifacts/streambox/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23561"
BASE_PATH = "/"
